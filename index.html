<!DOCTYPE html>
<html lang="en">
<head>

    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      border-radius: 12px;
      box-shadow:
        0 0 40px rgba(255, 100, 150, 0.3),
        0 0 80px rgba(255, 100, 150, 0.1),
        inset 0 0 60px rgba(0,0,0,0.3);
    }

    #loading-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, #1a0a1e 0%, #0a0a12 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #loading-modal.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-modal h1 {
      font-size: 2.5rem;
      color: #ff6b9d;
      text-shadow: 0 0 30px rgba(255,107,157,0.5);
      margin-bottom: 1rem;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,107,157,0.2);
      border-top-color: #ff6b9d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #orientation-hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      max-width: min(92vw, 460px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 136, 187, 0.45);
      border-radius: 8px;
      background: rgba(16, 6, 20, 0.82);
      color: #ffd6e6;
      font-size: 13px;
      text-align: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    @media (orientation: portrait) and (max-width: 820px) {
      #orientation-hint { opacity: 1; }
    }

</head>

  // ----- SOUND (Web Audio API) -----
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function playTone(freq, duration, type, volume) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume || 0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }
  function playNoise(duration, volume) {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - i / bufferSize);
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    src.buffer = buffer;
    gain.gain.setValueAtTime(volume || 0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start();
  }
  // Slap / fap sound on paddle hit
  function sfxBounce() {
    playNoise(0.06, 0.2);
    playTone(180 + Math.random() * 60, 0.04, 'square', 0.08);
  }
  // Wet smack on brick hit
  function sfxHit() {
    playNoise(0.04, 0.12);
    playTone(250 + Math.random() * 150, 0.05, 'square', 0.1);
  }
  // Moan-like rising tone on brick break
  function sfxBreak() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    const baseFreq = 250 + Math.random() * 100;
    osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 2.5, audioCtx.currentTime + 0.15);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.2, audioCtx.currentTime + 0.25);
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
    playNoise(0.08, 0.06);
  }
  function sfxPowerup(type) {
    switch (type) {
      case 'viagra':
        playTone(150, 0.08, 'triangle', 0.11);
        setTimeout(() => playTone(230, 0.10, 'triangle', 0.12), 70);
        setTimeout(() => playTone(340, 0.18, 'sine', 0.13), 150);
        break;
      case 'orgy':
        [360, 460, 560, 690].forEach((freq, i) => {
          setTimeout(() => playTone(freq, 0.09, i % 2 ? 'sine' : 'triangle', 0.1), i * 45);
        });

    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.5);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
    setTimeout(() => playNoise(0.15, 0.1), 100);

  // Orgasm-like crescendo on level up
  function sfxLevelUp() {
    const freqs = [300, 350, 420, 500, 600, 720, 880, 1050];
    freqs.forEach((f, i) => {
      setTimeout(() => {
        playTone(f, 0.12, 'sine', 0.08 + i * 0.01);

  function sfxLaunch() {
    playTone(160, 0.05, 'triangle', 0.08);

    [523, 659, 784, 1046].forEach((freq, i) => {

  // ----- FLOATING TEXT -----
  let floatingTexts = [];
  function spawnFloatingText(x, y, text, color, size) {
    floatingTexts.push({ x, y, text, color, size: size || 14, life: 1, vy: -1.5 });
  }

  // ----- SCREEN SHAKE -----
  let shakeAmount = 0;
  let shakeDecay = 0.9;
  let gameOverAt = 0;

  // ----- CANVAS SETUP -----
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');

  // Base design resolution (landscape)
  const BASE_W = 960;
  const BASE_H = 600;

  let scale = 1;
  let offsetX = 0, offsetY = 0;

  function resizeCanvas() {
    const maxW = window.innerWidth * 0.96;
    const maxH = window.innerHeight * 0.94;
    const aspect = BASE_W / BASE_H;
    let w, h;
    if (maxW / maxH > aspect) {
      h = maxH;
      w = h * aspect;
    } else {
      w = maxW;
      h = w / aspect;
    }
    canvas.width = BASE_W;
    canvas.height = BASE_H;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    scale = w / BASE_W;
    const rect = canvas.getBoundingClientRect();
    offsetX = rect.left;
    offsetY = rect.top;
  }

  // ----- GAME STATE -----
  const STATE = {
    MENU: 0,
    PLAYING: 1,
    PAUSED: 2,
    LEVEL_COMPLETE: 3,
    GAME_OVER: 4,
    VICTORY: 5
  };

  let gameState = STATE.MENU;
  let score = 0;
  let lives = 3;
  let level = 1;
  let combo = 0;
  let maxCombo = 0;
  let highScore = parseInt(localStorage.getItem('dongbreaker_hs') || '0');
  let passwordRevealed = false;

  // ----- PADDLE -----
  const paddle = {
    x: BASE_W / 2,
    y: BASE_H - 40,
    width: 120,
    height: 18,
    baseWidth: 120,
    speed: 0,
    targetX: BASE_W / 2,
    sticky: false,
    stickyBall: null,
    powerTimer: 0,
    powerType: null
  };

  // ----- BALL(S) -----
  let balls = [];
  const BALL_RADIUS = 8;
  const BALL_BASE_SPEED = 5.5;
  let ballSpeed = BALL_BASE_SPEED;

  function createBall(x, y, dx, dy) {
    return { x, y, dx, dy, radius: BALL_RADIUS, trail: [], fireball: false };
  }

  function resetBall() {
    balls = [];
    const b = createBall(paddle.x, paddle.y - BALL_RADIUS - paddle.height / 2, 0, 0);
    paddle.sticky = true;
    paddle.stickyBall = b;
    balls.push(b);
  }

  function launchBall() {
    if (paddle.sticky && paddle.stickyBall) {
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.4;
      paddle.stickyBall.dx = Math.cos(angle) * ballSpeed;
      paddle.stickyBall.dy = Math.sin(angle) * ballSpeed;
      paddle.sticky = false;
      paddle.stickyBall = null;
      sfxLaunch();
    }
  }

  // ----- BRICKS -----
  let bricks = [];
  const BRICK_ROWS = 8;
  const BRICK_COLS = 12;
  const BRICK_W = 58;
  const BRICK_H = 22;
  const BRICK_PAD = 4;
  const BRICK_OFFSET_X = 80;
  const BRICK_OFFSET_Y = 42;

  // Brick types: 'normal', 'hard', 'balls' (has balls on it), 'sperm'
  const BRICK_COLORS = [
    '#ff6b9d', '#ff4081', '#e91e63', '#c2185b', '#880e4f',
    '#f48fb1', '#f06292', '#ec407a', '#d81b60', '#ad1457',

  const LEVEL_PATTERNS = [
    [

    ],

  function getLevelSpeed(lvl) {
    return BALL_BASE_SPEED + (lvl - 1) * 0.55 + Math.max(0, lvl - 6) * 0.25;
  }

  function getLevelPaddleWidth(lvl) {
    return Math.max(76, 124 - (lvl - 1) * 5);
  }

  function applyLevelDifficulty() {
    ballSpeed = getLevelSpeed(level);
    paddle.baseWidth = getLevelPaddleWidth(level);
    paddle.width = paddle.baseWidth;
  }

  function generateLevel(lvl) {
    bricks = [];
    const pattern = LEVEL_PATTERNS[Math.min(lvl - 1, LEVEL_PATTERNS.length - 1)];
    const extraHp = Math.floor(Math.max(0, lvl - LEVEL_PATTERNS.length) / 2);
    const lateHpBump = Math.floor(Math.max(0, lvl - 5) / 4);

    pattern.forEach((row, r) => {
      for (let c = 0; c < row.length; c++) {
        const marker = row[c];
        if (marker === '.') continue;
        const markedHp = parseInt(marker, 10);
        const hp = Math.min(8, markedHp + extraHp + lateHpBump);
        bricks.push(makeBrick(r, c, hp, BRICK_COLORS[(r * 2 + c + lvl) % BRICK_COLORS.length]));
      }
    });

    const ballsChance = Math.min(0.24, 0.10 + lvl * 0.012);
    const spermChance = Math.min(0.18, 0.07 + lvl * 0.01);
    bricks.forEach(b => {
      const roll = Math.random();
      if (roll < ballsChance) {
        b.type = 'balls';
      } else if (roll < ballsChance + spermChance) {
        b.type = 'sperm';
      }
    });
  }

  function makeBrick(r, c, hp, color) {
    return {
      x: BRICK_OFFSET_X + c * (BRICK_W + BRICK_PAD),
      y: BRICK_OFFSET_Y + r * (BRICK_H + BRICK_PAD),
      w: BRICK_W,
      h: BRICK_H,
      hp: hp,
      maxHp: hp,
      color: color,
      type: 'normal',
      alive: true,
      shakeTimer: 0,
      particles: []

  }

  // ----- POWERUPS -----
  let powerups = [];
  // Sex-themed power-ups
  const POWERUP_TYPES = ['viagra', 'orgy', 'boner', 'cockring', 'moneyshot', 'blueballs'];

  const POWERUP_LABELS = {

    orgy: 'ORGY!',
    boner: 'BONER!',
    cockring: 'COCK RING!',
    moneyshot: 'MONEYSHOT!',
    blueballs: 'BLUE BALLS!'
  };

  function spawnPowerup(x, y) {
    const chance = Math.max(0.12, 0.30 - (level - 1) * 0.018);
    if (Math.random() > chance) return;
    const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
    powerups.push({ x, y, type, radius: 15, vy: POWERUP_SPEED, rotation: 0 });
  }

  function applyPowerup(type) {
    switch (type) {
      case 'viagra': { // Big dick paddle
        paddle.width = Math.min(210, paddle.baseWidth * 1.7);
        paddle.powerType = 'viagra';
        paddle.powerTimer = 600;
        break;
      }
      case 'orgy': { // Multi-ball
        const newBalls = [];
        balls.forEach(b => {
          for (let i = 0; i < 2; i++) {
            const angle = Math.atan2(b.dy, b.dx) + (i === 0 ? 0.4 : -0.4);
            const nb = createBall(b.x, b.y,
              Math.cos(angle) * ballSpeed,
              Math.sin(angle) * ballSpeed);
            newBalls.push(nb);
          }
        });
        balls = balls.concat(newBalls);
        break;
      }
      case 'boner': { // Fireball piercing
        balls.forEach(b => b.fireball = true);
        paddle.powerType = 'boner';
        paddle.powerTimer = 480;
        break;
      }
      case 'cockring': { // Extra life
        lives = Math.min(5, lives + 1);

      case 'moneyshot': { // Sperm blast
        destroyRandomBricks(5 + Math.min(level, 4));
        break;

      case 'blueballs': { // Slow down
        ballSpeed = getLevelSpeed(level) * 0.62;
        paddle.powerType = 'blueballs';
        paddle.powerTimer = 420;
        break;
      }
    }

  // ----- PARTICLES -----
  let particles = [];

  function spawnParticles(x, y, color, count, speed) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * speed + 1;
      particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 1,
        decay: 0.01 + Math.random() * 0.03,
        size: 2 + Math.random() * 4,
        color
      });
    }
  }

  function spawnSpermParticles(x, y) {
    for (let i = 0; i < 18; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * 3 + 1;
      particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 1,
        decay: 0.008 + Math.random() * 0.015,
        size: 3 + Math.random() * 3,
        color: '#fff',
        isSperm: true,
        tailAngle: angle + Math.PI,
        wiggle: Math.random() * 10
      });
    }
  }

  function destroyRandomBricks(count) {
    const targets = bricks
      .filter(b => b.alive)
      .sort(() => Math.random() - 0.5)
      .slice(0, count);

    if (targets.length === 0) return;

    shakeAmount = Math.min(10, shakeAmount + 5);
    targets.forEach(brick => {
      brick.alive = false;
      const bx = brick.x + brick.w / 2;
      const by = brick.y + brick.h / 2;
      const points = 20 + level * 5;
      score += points;
      spawnSpermParticles(bx, by);
      spawnParticles(bx, by, brick.color, 12, 5);
      spawnFloatingText(bx, by - 12, `+${points}`, '#fff4cf', 13);
    });
    checkPasswordUnlock();
  }

  function checkPasswordUnlock() {
    if (passwordRevealed || score < PASSWORD_TARGET_SCORE) return;
    passwordRevealed = true;
    spawnFloatingText(BASE_W / 2, BASE_H * 0.42, 'SECRET UNLOCKED!', '#ffdd44', 26);
    sfxUnlock();

  // ----- DRAWING HELPERS -----

  // Draw a cartoon dong shape (for bricks, powerups)
  function drawDong(ctx, x, y, w, h, color, withBalls) {
    ctx.save();
    const shaftW = w * 0.35;
    const shaftH = h * 0.85;
    const headR = shaftW * 0.65;

    // Shaft
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x + w / 2 - shaftW / 2, y + h - shaftH, shaftW, shaftH, [4, 4, 2, 2]);
    ctx.fill();

    // Head
    ctx.fillStyle = lightenColor(color, 20);
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y + h - shaftH, headR, headR * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Outline
    ctx.strokeStyle = darkenColor(color, 30);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(x + w / 2 - shaftW / 2, y + h - shaftH, shaftW, shaftH, [4, 4, 2, 2]);
    ctx.stroke();

  function drawSmallDong(ctx, x, y, size, color, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    const s = size;
    // Shaft
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(-s * 0.2, -s * 0.5, s * 0.4, s * 0.8, [3, 3, 1, 1]);
    ctx.fill();
    // Head
    ctx.fillStyle = lightenColor(color, 25);
    ctx.beginPath();
    ctx.ellipse(0, -s * 0.5, s * 0.28, s * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
    // Balls
    ctx.fillStyle = darkenColor(color, 15);
    ctx.beginPath();
    ctx.arc(-s * 0.15, s * 0.35, s * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.15, s * 0.35, s * 0.15, 0, Math.PI * 2);

  function drawSperm(ctx, x, y, size, angle, wigglePhase) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    // Head
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(0, 0, size * 0.5, size * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Tail (wavy)
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(size * 0.4, 0);
    for (let t = 0; t < 1; t += 0.05) {
      const tx = size * 0.4 + t * size * 2;
      const ty = Math.sin(t * 8 + wigglePhase) * size * 0.3 * t;
      ctx.lineTo(tx, ty);
    }
    ctx.stroke();

    ctx.restore();
  }

  // ----- BRICK RENDERING -----
  function drawBrick(brick) {
    if (!brick.alive) return;

    ctx.save();

    // Shake effect
    let shakeX = 0, shakeY = 0;
    if (brick.shakeTimer > 0) {
      shakeX = (Math.random() - 0.5) * 4;
      shakeY = (Math.random() - 0.5) * 4;
    }

    const bx = brick.x + shakeX;
    const by = brick.y + shakeY;

    // HP-based opacity
    const alpha = 0.5 + (brick.hp / brick.maxHp) * 0.5;
    ctx.globalAlpha = alpha;

    // Base brick (rounded rect with gradient)
    const grad = ctx.createLinearGradient(bx, by, bx, by + brick.h);
    grad.addColorStop(0, lightenColor(brick.color, 20));
    grad.addColorStop(1, darkenColor(brick.color, 15));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(bx, by, brick.w, brick.h, 4);
    ctx.fill();

    // Border
    ctx.strokeStyle = darkenColor(brick.color, 35);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(bx, by, brick.w, brick.h, 4);
    ctx.stroke();

    // Highlight
    ctx.strokeStyle = `rgba(255,255,255,0.3)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bx + 4, by + 2);
    ctx.lineTo(bx + brick.w - 4, by + 2);
    ctx.stroke();

    ctx.globalAlpha = 1;

    // Type indicators
    if (brick.type === 'balls') {
      const bcx = bx + brick.w / 2;
      const bcy = by + brick.h / 2;
      const bs = Math.min(brick.h * 0.58, 12);

      // Short shaft/base so the marker reads anatomically, not as two dots.
      ctx.fillStyle = lightenColor(brick.color, 24);
      ctx.beginPath();
      ctx.roundRect(bcx - bs * 0.35, bcy - bs * 1.02, bs * 0.7, bs * 0.74, 3);
      ctx.fill();
      ctx.strokeStyle = darkenColor(brick.color, 45);
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.roundRect(bcx - bs * 0.35, bcy - bs * 1.02, bs * 0.7, bs * 0.74, 3);
      ctx.stroke();

      // Sack background
      ctx.fillStyle = darkenColor(brick.color, 30);
      ctx.beginPath();
      ctx.ellipse(bcx, bcy + bs * 0.18, bs * 1.75, bs * 1.05, 0, 0, Math.PI * 2);
      ctx.fill();
      // Left ball
      ctx.fillStyle = lightenColor(brick.color, -10);
      ctx.beginPath();
      ctx.ellipse(bcx - bs * 0.58, bcy + bs * 0.18, bs * 0.92, bs * 1.02, -0.18, 0, Math.PI * 2);
      ctx.fill();
      // Right ball
      ctx.beginPath();
      ctx.ellipse(bcx + bs * 0.58, bcy + bs * 0.18, bs * 0.92, bs * 1.02, 0.18, 0, Math.PI * 2);
      ctx.fill();
      // Outlines
      ctx.strokeStyle = darkenColor(brick.color, 50);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(bcx - bs * 0.58, bcy + bs * 0.18, bs * 0.92, bs * 1.02, -0.18, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(bcx + bs * 0.58, bcy + bs * 0.18, bs * 0.92, bs * 1.02, 0.18, 0, Math.PI * 2);
      ctx.stroke();
      // Center crease
      ctx.strokeStyle = darkenColor(brick.color, 45);
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(bcx, bcy - bs * 0.68);
      ctx.quadraticCurveTo(bcx + 0.5, bcy + bs * 0.18, bcx, bcy + bs * 1.05);
      ctx.stroke();
      // Wrinkle lines
      ctx.strokeStyle = darkenColor(brick.color, 35);
      ctx.lineWidth = 0.5;
      for (let w = 0; w < 4; w++) {
        const wy = bcy - bs * 0.28 + w * bs * 0.32;
        ctx.beginPath();
        ctx.moveTo(bcx - bs * 0.82, wy);
        ctx.quadraticCurveTo(bcx, wy + 1.8, bcx + bs * 0.82, wy);

    if (brick.hp > 1) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px Outfit';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(brick.hp.toString(), bx + brick.w / 2, by + brick.h / 2);

  // ----- BALL RENDERING -----
  function drawBalls() {
    balls.forEach(ball => {
      ctx.save();

      // Trail
      if (ball.trail.length > 1) {
        for (let i = 1; i < ball.trail.length; i++) {
          const t = i / ball.trail.length;
          ctx.globalAlpha = t * 0.3;
          ctx.fillStyle = ball.fireball ? '#ff4400' : '#ffaacc';
          ctx.beginPath();
          ctx.arc(ball.trail[i].x, ball.trail[i].y, ball.radius * t, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // Ball body - make it look like a small round head
      ctx.shadowColor = ball.fireball ? '#ff4400' : '#ff6bb5';
      ctx.shadowBlur = ball.fireball ? 20 : 10;

      const grad = ctx.createRadialGradient(
        ball.x - 2, ball.y - 2, 1,
        ball.x, ball.y, ball.radius
      );
      if (ball.fireball) {
        grad.addColorStop(0, '#ffdd44');
        grad.addColorStop(0.5, '#ff6600');
        grad.addColorStop(1, '#cc2200');
      } else {
        grad.addColorStop(0, '#ffe0ee');
        grad.addColorStop(0.5, '#ffaacc');
        grad.addColorStop(1, '#ff6699');
      }

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      // Inner highlight
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(ball.x - 2, ball.y - 2, ball.radius * 0.35, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.restore();
    });
  }

      ctx.fillText(POWERUP_LABELS[pu.type] || '', 0, r + 2);

  function drawBackground() {
    // Gradient background
    const grad = ctx.createLinearGradient(0, 0, 0, BASE_H);
    grad.addColorStop(0, '#0d0015');
    grad.addColorStop(0.5, '#1a0a2e');
    grad.addColorStop(1, '#0d0015');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, BASE_W, BASE_H);

    // Stars
    const now = performance.now();
    bgStars.forEach(star => {
      const alpha = 0.3 + Math.sin(now / 1000 + star.twinkle) * 0.3;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ff88bb';
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Side borders glow
    const sideGrad = ctx.createLinearGradient(0, 0, 30, 0);
    sideGrad.addColorStop(0, 'rgba(255,100,150,0.15)');
    sideGrad.addColorStop(1, 'rgba(255,100,150,0)');
    ctx.fillStyle = sideGrad;
    ctx.fillRect(0, 0, 30, BASE_H);

    const sideGrad2 = ctx.createLinearGradient(BASE_W, 0, BASE_W - 30, 0);
    sideGrad2.addColorStop(0, 'rgba(255,100,150,0.15)');
    sideGrad2.addColorStop(1, 'rgba(255,100,150,0)');
    ctx.fillStyle = sideGrad2;
    ctx.fillRect(BASE_W - 30, 0, 30, BASE_H);

    particles.forEach(p => {

      ctx.globalAlpha = p.life;

        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();

      ctx.globalAlpha = 1;
      ctx.restore();

  // ----- COLLISION DETECTION -----
  function ballBrickCollision(ball, brick) {
    if (!brick.alive) return false;

    // AABB vs circle
    const closestX = Math.max(brick.x, Math.min(ball.x, brick.x + brick.w));
    const closestY = Math.max(brick.y, Math.min(ball.y, brick.y + brick.h));
    const dx = ball.x - closestX;
    const dy = ball.y - closestY;
    return (dx * dx + dy * dy) < (ball.radius * ball.radius);
  }

  function ballPaddleCollision(ball) {
    const px = paddle.x - paddle.width / 2;
    const py = paddle.y - paddle.height / 2;
    const closestX = Math.max(px, Math.min(ball.x, px + paddle.width));
    const closestY = Math.max(py, Math.min(ball.y, py + paddle.height));
    const dx = ball.x - closestX;
    const dy = ball.y - closestY;
    return (dx * dx + dy * dy) < (ball.radius * ball.radius);
  }

  // ----- UPDATE -----
  function update() {
    if (gameState !== STATE.PLAYING) return;

    // Paddle movement (smooth follow)
    paddle.x += (paddle.targetX - paddle.x) * 0.2;
    paddle.x = Math.max(paddle.width / 2, Math.min(BASE_W - paddle.width / 2, paddle.x));

    // Power timer
    if (paddle.powerTimer > 0) {
      paddle.powerTimer--;
      if (paddle.powerTimer <= 0) {
        paddle.powerType = null;
        paddle.width = paddle.baseWidth;
        ballSpeed = getLevelSpeed(level);
        balls.forEach(b => b.fireball = false);
      }
    }

    // Sticky ball follows paddle
    if (paddle.sticky && paddle.stickyBall) {
      paddle.stickyBall.x = paddle.x;
      paddle.stickyBall.y = paddle.y - BALL_RADIUS - paddle.height / 2;
    }

    // Update balls
    const deadBalls = [];
    balls.forEach((ball, idx) => {
      if (paddle.sticky && ball === paddle.stickyBall) return;

      // Trail
      ball.trail.push({ x: ball.x, y: ball.y });
      if (ball.trail.length > 8) ball.trail.shift();

      ball.x += ball.dx;
      ball.y += ball.dy;

      // Wall collisions
      if (ball.x - ball.radius < 0) {
        ball.x = ball.radius;
        ball.dx = Math.abs(ball.dx);
      }
      if (ball.x + ball.radius > BASE_W) {
        ball.x = BASE_W - ball.radius;
        ball.dx = -Math.abs(ball.dx);
      }
      if (ball.y - ball.radius < 0) {
        ball.y = ball.radius;
        ball.dy = Math.abs(ball.dy);
      }

      // Bottom - ball lost
      if (ball.y + ball.radius > BASE_H + 20) {
        deadBalls.push(idx);
        return;
      }

      // Paddle collision
      if (ball.dy > 0 && ballPaddleCollision(ball)) {
        const hitPos = (ball.x - paddle.x) / (paddle.width / 2); // -1 to 1
        const angle = hitPos * (Math.PI / 3); // Max 60 degree deflection
        const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
        ball.dx = Math.sin(angle) * speed;
        ball.dy = -Math.cos(angle) * speed;
        ball.y = paddle.y - paddle.height / 2 - ball.radius;

        // Ensure ball always goes up
        if (ball.dy > -1) ball.dy = -1;

        combo = 0;
        spawnParticles(ball.x, ball.y, '#ffaacc', 5, 2);
        sfxBounce();
      }

      // Brick collisions
      bricks.forEach(brick => {
        if (!brick.alive) return;
        if (ballBrickCollision(ball, brick)) {
          // Damage brick
          brick.hp--;
          brick.shakeTimer = 8;
          combo++;
          maxCombo = Math.max(maxCombo, combo);
          shakeAmount = Math.min(4, shakeAmount + 1.5);

          const points = (10 + level * 5) * Math.min(combo, 10);
          score += points;
          checkPasswordUnlock();

          spawnParticles(ball.x, ball.y, brick.color, 8, 4);
          if (combo > 2) spawnFloatingText(ball.x, ball.y - 10, `x${combo}`, '#ffdd44', 12 + Math.min(combo, 8));
          sfxHit();

          if (brick.type === 'sperm') {
            spawnSpermParticles(brick.x + brick.w / 2, brick.y + brick.h / 2);
          }

          if (brick.hp <= 0) {
            brick.alive = false;
            spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, 15, 5);
            spawnPowerup(brick.x + brick.w / 2, brick.y + brick.h / 2);
            spawnFloatingText(brick.x + brick.w / 2, brick.y, `+${points}`, '#fff', 13);
            sfxBreak();
            shakeAmount = Math.min(6, shakeAmount + 2);

            if (brick.type === 'sperm') {
              spawnSpermParticles(brick.x + brick.w / 2, brick.y + brick.h / 2);
            }
          }

          // Reflect ball (unless fireball)
          if (!ball.fireball) {
            // Determine reflection side
            const overlapLeft = (ball.x + ball.radius) - brick.x;
            const overlapRight = (brick.x + brick.w) - (ball.x - ball.radius);
            const overlapTop = (ball.y + ball.radius) - brick.y;
            const overlapBottom = (brick.y + brick.h) - (ball.y - ball.radius);
            const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

            if (minOverlap === overlapLeft || minOverlap === overlapRight) {
              ball.dx = -ball.dx;
            } else {
              ball.dy = -ball.dy;
            }
          }
        }
      });
    });

    // Remove dead balls (from bottom)
    deadBalls.sort((a, b) => b - a).forEach(idx => balls.splice(idx, 1));

    // All balls lost
    if (balls.length === 0) {
      lives--;
      combo = 0;
      sfxDie();
      shakeAmount = 8;
      if (lives <= 0) {
        gameState = STATE.GAME_OVER;
        gameOverAt = performance.now();
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('dongbreaker_hs', highScore.toString());
        }
      } else {
        resetBall();
      }
    }

    // Update brick shake
    bricks.forEach(b => {
      if (b.shakeTimer > 0) b.shakeTimer--;
    });

    // Update powerups
    powerups.forEach((pu, idx) => {
      pu.y += pu.vy;
      pu.rotation += 0.03;

      // Paddle catch
      if (pu.y + pu.radius > paddle.y - paddle.height / 2 &&
          pu.y - pu.radius < paddle.y + paddle.height / 2 &&
          pu.x > paddle.x - paddle.width / 2 &&
          pu.x < paddle.x + paddle.width / 2) {
        applyPowerup(pu.type);
        spawnParticles(pu.x, pu.y, getPowerupColor(pu.type), 12, 3);
        sfxPowerup(pu.type);
        spawnFloatingText(pu.x, pu.y - 15, pu.type.toUpperCase() + '!', getPowerupColor(pu.type), 16);
        pu.y = BASE_H + 100; // Mark for removal
      }
    });
    powerups = powerups.filter(pu => pu.y < BASE_H + 50);

    // Update particles
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05; // Gravity
      p.life -= p.decay;
    });
    particles = particles.filter(p => p.life > 0);

    // Update floating texts
    floatingTexts.forEach(ft => {
      ft.y += ft.vy;
      ft.life -= 0.02;
    });
    floatingTexts = floatingTexts.filter(ft => ft.life > 0);

    // Update screen shake
    shakeAmount *= shakeDecay;

    // Level complete check
    if (bricks.every(b => !b.alive)) {
      score += level * 100; // Level bonus
      lives += 1;
      spawnFloatingText(BASE_W / 2, BASE_H * 0.56, '+1 LIFE', '#44ff88', 22);
      checkPasswordUnlock();
      gameState = STATE.LEVEL_COMPLETE;
      sfxLevelUp();
      // Celebration particles
      for (let i = 0; i < 40; i++) {
        spawnParticles(
          Math.random() * BASE_W,
          Math.random() * BASE_H * 0.5,
          BRICK_COLORS[Math.floor(Math.random() * BRICK_COLORS.length)],
          3, 4
        );
      }
    }
  }

  // ----- RENDER -----
  function render() {
    ctx.save();
    if (gameState === STATE.GAME_OVER && gameOverAt > 0) {
      const gameOverElapsed = performance.now() - gameOverAt;
      if (gameOverElapsed > 5000) {
        shakeAmount = 0;
      } else {
        shakeAmount *= 0.96;
      }
    }
    // Apply screen shake
    if (shakeAmount > 0.5) {
      ctx.translate(
        (Math.random() - 0.5) * shakeAmount * 2,
        (Math.random() - 0.5) * shakeAmount * 2
      );
    }
    ctx.clearRect(-10, -10, BASE_W + 20, BASE_H + 20);

    if (gameState === STATE.MENU) {
      drawMenuScreen();
      ctx.restore();
      return;
    }

    drawBackground();

    if (gameState === STATE.PLAYING || gameState === STATE.GAME_OVER || gameState === STATE.LEVEL_COMPLETE) {
      // Draw bricks
      bricks.forEach(drawBrick);

      // Draw powerups
      drawPowerups();

      // Draw paddle
      drawPaddle();

      // Draw balls
      drawBalls();

      // Draw floating texts
      drawFloatingTexts();

      // Draw particles
      drawParticles();

      // HUD
      drawHUD();
    }

    if (gameState === STATE.GAME_OVER) {
      drawGameOverScreen();
    }

    if (gameState === STATE.LEVEL_COMPLETE) {
      drawLevelCompleteScreen();
    }
    ctx.restore();
  }

  // ----- GAME LOOP -----
  let lastTime = 0;

  function gameLoop(timestamp) {
    const dt = Math.min(timestamp - lastTime, 32); // Cap delta
    lastTime = timestamp;

    update();
    render();

    requestAnimationFrame(gameLoop);
  }

  // ----- INPUT -----
  function getCanvasPos(clientX, clientY) {
    return {
      x: (clientX - offsetX) / scale,
      y: (clientY - offsetY) / scale
    };
  }

  canvas.addEventListener('mousemove', (e) => {
    const pos = getCanvasPos(e.clientX, e.clientY);
    paddle.targetX = pos.x;
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const pos = getCanvasPos(touch.clientX, touch.clientY);
    paddle.targetX = pos.x;
  }, { passive: false });

  function handleClick() {
    initAudio();
    if (gameState === STATE.MENU) {
      startGame();
    } else if (gameState === STATE.PLAYING) {
      launchBall();
    } else if (gameState === STATE.GAME_OVER) {
      startGame();
    } else if (gameState === STATE.LEVEL_COMPLETE) {
      nextLevel();
    }
  }

  canvas.addEventListener('click', handleClick);
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const pos = getCanvasPos(touch.clientX, touch.clientY);
    paddle.targetX = pos.x;
    handleClick();
  }, { passive: false });

  // Keyboard support
  const keys = {};
  document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === ' ' || e.key === 'Enter') {
      handleClick();
    }
  });
  document.addEventListener('keyup', (e) => {
    keys[e.key] = false;
  });

  // Keyboard paddle control
  function keyboardUpdate() {
    if (keys['ArrowLeft'] || keys['a']) {
      paddle.targetX -= 8;
    }
    if (keys['ArrowRight'] || keys['d']) {
      paddle.targetX += 8;
    }
    requestAnimationFrame(keyboardUpdate);
  }
  keyboardUpdate();

  // ----- GAME FLOW -----
  function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    combo = 0;
    maxCombo = 0;
    gameOverAt = 0;
    applyLevelDifficulty();
    paddle.powerType = null;
    paddle.powerTimer = 0;
    powerups = [];
    particles = [];
    passwordRevealed = false;

    generateLevel(level);
    resetBall();
    gameState = STATE.PLAYING;
  }

  function nextLevel() {
    level++;
    applyLevelDifficulty();
    paddle.powerType = null;
    paddle.powerTimer = 0;
    powerups = [];
    particles = [];

    generateLevel(level);
    resetBall();
    gameState = STATE.PLAYING;
  }

  // ----- COLOR UTILS -----
  function lightenColor(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    const r = Math.min(255, (num >> 16) + amount);
    const g = Math.min(255, ((num >> 8) & 0xff) + amount);
    const b = Math.min(255, (num & 0xff) + amount);
    return `rgb(${r},${g},${b})`;
  }

  function darkenColor(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    const r = Math.max(0, (num >> 16) - amount);
    const g = Math.max(0, ((num >> 8) & 0xff) - amount);
    const b = Math.max(0, (num & 0xff) - amount);
    return `rgb(${r},${g},${b})`;
  }

  // ----- INIT -----
  function init() {
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Hide loading
    setTimeout(() => {
      document.getElementById('loading-modal').classList.add('hidden');
    }, 500);

    requestAnimationFrame(gameLoop);
  }

  init();
})();
</script>
